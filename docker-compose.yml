services:
  db:
    image: postgres:16-alpine
    container_name: homeplanner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homeplanner}
      POSTGRES_USER: ${POSTGRES_USER:-homeplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homeplanner}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homeplanner-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in .env}
      PORT: 3001
      # AI / LiteLLM config — set these in .env to enable vision features
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-unused}
      AI_VISION_MODEL: ${AI_VISION_MODEL:-llama3.2-vision:11b}
      AI_TEXT_MODEL: ${AI_TEXT_MODEL:-qwen3:30b-a3b}
    # No host port: nginx proxies /api/ to backend:3001 over the internal network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homeplanner-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
    name: homeplanner-pgdata
